name: Snyk

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Snyk CLI
        run: npm install -g snyk --ignore-scripts

      - name: Snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          mkdir -p sarif-reports
          snyk test --all-projects --severity-threshold=high --sarif-file-output=sarif-reports/snyk-review-agent.sarif || true
          
      - name: Upload Snyk SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-reports/snyk-review-agent.sarif

      - name: Snyk monitor
        run: snyk monitor --all-projects
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}